name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build blog
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest

      - name: Run hugo
        run: hugo --source blog --minify

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Sync blog to production
        run: |
          rsync -az --delete \
            blog/public/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/strataapp/repo/blog/public/

      - name: Pull latest code and restart
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /opt/strataapp/repo &&
            git pull &&
            /opt/strataapp/.local/bin/uv sync --project app &&
            sudo systemctl restart strataapp
          '
