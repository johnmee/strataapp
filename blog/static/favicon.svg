  <rect x="42" y="22" width="9" height="7" rx="1" fill="#cce4ff"/>
  <rect x="13" y="36" width="9" height="6" rx="1" fill="#cce4ff"/>
  <rect x="42" y="36" width="9" height="6" rx="1" fill="#cce4ff"/>
  <rect x="13" y="48" width="9" height="8" rx="1" fill="#cce4ff"/>
  <rect x="42" y="48" width="9" height="8" rx="1" fill="#cce4ff"/>
  <!-- Door -->
