<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Building body -->
  <rect x="8" y="20" width="48" height="36" rx="2" fill="#0066cc"/>

  <!-- Roof / top band -->
  <rect x="8" y="16" width="48" height="6" rx="2" fill="#004999"/>

  <!-- Floor dividers -->
  <line x1="8" y1="33" x2="56" y2="33" stroke="#004999" stroke-width="1.5"/>
  <line x1="8" y1="45" x2="56" y2="45" stroke="#004999" stroke-width="1.5"/>

  <!-- Top floor windows -->
  <rect x="14" y="22" width="8" height="8" rx="1" fill="#cce4ff"/>
  <rect x="27" y="22" width="10" height="8" rx="1" fill="#cce4ff"/>
  <rect x="42" y="22" width="8" height="8" rx="1" fill="#cce4ff"/>

  <!-- Middle floor windows -->
  <rect x="14" y="36" width="8" height="6" rx="1" fill="#cce4ff"/>
  <rect x="27" y="36" width="10" height="6" rx="1" fill="#cce4ff"/>
  <rect x="42" y="36" width="8" height="6" rx="1" fill="#cce4ff"/>

  <!-- Ground floor: two windows + central door -->
  <rect x="14" y="48" width="8" height="8" rx="1" fill="#cce4ff"/>
  <rect x="42" y="48" width="8" height="8" rx="1" fill="#cce4ff"/>
  <rect x="26" y="49" width="12" height="7" rx="1" fill="#004999"/>
</svg>
